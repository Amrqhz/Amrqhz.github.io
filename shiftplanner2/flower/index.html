<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Theme Settings</title>

<style>
:root{
    --primary:#7c3aed;
    --secondary:#a78bfa;
    --bg1:#f3f3f1;
    --bg2:#ede9fe;
    --text:#1f2937;
    --card-bg:rgba(255,255,255,.35);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,var(--bg1),var(--bg2));
    transition:.4s ease;
    overflow:hidden;
}

.container{
    width:min(900px,90%);
}

.view{
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    background:var(--card-bg);
    border:1px solid rgba(255,255,255,.25);
    border-radius:30px;
    padding:40px;
    box-shadow:
        0 8px 32px rgba(0,0,0,.12),
        inset 0 1px 0 rgba(255,255,255,.5);
    position:relative;
    overflow:hidden;
}

.view::before{
    content:"";
    position:absolute;
    width:250px;
    height:250px;
    border-radius:50%;
    background:var(--secondary);
    opacity:.15;
    top:-80px;
    right:-80px;
    filter:blur(40px);
}

h1{
    color:var(--text);
    margin-bottom:10px;
}

p{
    color:#4b5563;
    margin-bottom:30px;
}

.settings-title{
    margin-bottom:15px;
    font-weight:600;
    color:var(--text);
}

.theme-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
}

.theme-btn{
    border:none;
    border-radius:18px;
    padding:18px;
    cursor:pointer;
    transition:.25s;
    font-weight:600;
    color:white;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.theme-btn:hover{
    transform:translateY(-4px) scale(1.03);
}

.lavender{
    background:linear-gradient(135deg,#8b5cf6,#c4b5fd);

}

.pink{
    background:linear-gradient(135deg,#ec4899,#f9a8d4);
}

.blue{
    background:linear-gradient(135deg,#3b82f6,#93c5fd);
}

.flower1{
    background-image: url("../vecteezy_blue-hand-drawn-flower-background_25263349.svg");
    background:linear-gradient(135deg,#22c55e,#86efac);
}
.flower2{
    background-image: url("../vecteezy_botanical-seamless-pattern-with-leaves-floral-abstract_7809795.svg");
}

.active{
    outline:3px solid white;
}

/* THEMES */
body.default-theme{
    --bg1:#fff;
    --bg2: #dcfce7 
}

body.lavender-theme{
    --primary:#8b5cf6;
    --secondary:#c4b5fd;
    --bg1:#f5f3ff;
    --bg2:#ede9fe;
}

body.pink-theme{
    --primary:#ec4899;
    --secondary:#f9a8d4;
    --bg1:#fff1f7;
    --bg2:#ffe4ee;
}

body.blue-theme{
    --primary:#3b82f6;
    --secondary:#93c5fd;
    --bg1:#eef6ff;
    --bg2:#dbeafe;
}

body.flower-theme{
    --primary:#22c55e;
    --secondary:#86efac;
    --bg1:#f0fff4;
    --bg2:#dcfce7;
}

/* Flower Decoration */




.preview-card{
    margin-top:25px;
    padding:25px;
    border-radius:20px;
    backdrop-filter:blur(12px);
    background:rgba(255,255,255,.25);
}

.preview-card h3{
    color:var(--text);
    margin-bottom:10px;
}

.preview-card button{
    margin-top:15px;
    border:none;
    background:var(--primary);
    color:white;
    padding:12px 18px;
    border-radius:12px;
    cursor:pointer;
}


/* ==========================
   FLOWER THEME DECORATIONS
========================== */

.flower-decoration{
    position:fixed;
    pointer-events:none;
    z-index:-1;
    /* opacity: 0; */

    /* opacity:0; */
    transition:all .5s ease;

    filter:
        blur(1px)
        drop-shadow(0 10px 30px rgba(0,0,0,.08));
}

/* Top Right */

.flower-top{
    top:-50px;
    right:-50px;

    width:320px;
    height:auto;

}

/* Bottom Left */

.flower-bottom{
    bottom:-50px;
    left:-50px;

    width:2080px;
    height:auto;


}

/* Show only in flower theme */

body.flower-theme .flower-decoration{
    opacity:.18;
}
body.lavender-theme .flower-decoration{
    opacity:0;
}
body.pink-theme .flower-decoration{
    opacity:0;
}
body.default-theme .flower-decoration{
    opacity: 0;
} 
/* Nice hover-like animation */

body.flower-theme .flower-top{
    animation:floatFlower1 8s ease-in-out infinite;
}

body.flower-theme .flower-bottom{
    animation:floatFlower2 10s ease-in-out infinite;
}

</style>
</head>

<body class="default-theme">

<div class="container">
    <div class="view">

        <h1>⚙️ Settings</h1>
        <p>Choose your favorite theme. Your preference will be saved automatically.</p>

        <div class="settings-title">
            Theme Mode
        </div>

        <div class="theme-grid">
            <button class="theme-btn default"
            onclick="changeTheme('default-theme', this)">defualt</button>
            <button class="theme-btn lavender"
                onclick="changeTheme('lavender-theme',this)">
                Lavender
            </button>

            <button class="theme-btn pink"
                onclick="changeTheme('pink-theme',this)">
                Soft Pink
            </button>

            <button class="theme-btn blue"
                onclick="changeTheme('blue-theme',this)">
                Soft Blue
            </button>

            <button class="theme-btn flower"
                onclick="changeTheme('flower-theme',this)">
                Floral Special
            </button>
        </div>

        <div class="preview-card">
            <h3>Theme Preview</h3>
            <p>
                Glassmorphism card with blur effects,
                soft colors and elegant transitions.
            </p>

            <button>Sample Button</button>
        </div>

    </div>
</div>

<script>

const themes = [
    "default-theme"
,    "lavender-theme",
    "pink-theme",
    "blue-theme",
    "flower-theme"
];

function changeTheme(theme,btn){

    document.body.classList.remove(...themes);
    document.body.classList.add(theme);

    localStorage.setItem("selectedTheme",theme);

    document.querySelectorAll(".theme-btn")
        .forEach(b=>b.classList.remove("active"));

    btn.classList.add("active");
}

window.addEventListener("DOMContentLoaded",()=>{

    const savedTheme =
        localStorage.getItem("selectedTheme")
        || "default-theme";

    document.body.classList.add(savedTheme);

    document.querySelectorAll(".theme-btn")
        .forEach(btn=>{

            const text = btn.textContent.trim();

            if(
                (savedTheme==="default-theme" && text==="default") ||
                (savedTheme==="lavender-theme" && text==="Lavender") ||
                (savedTheme==="pink-theme" && text==="Soft Pink") ||
                (savedTheme==="blue-theme" && text==="Soft Blue") ||
                (savedTheme==="flower-theme" && text==="Floral Special")
            ){
                btn.classList.add("active");
            }
        });
});

</script>
